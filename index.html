<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequeños Detalles</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #11243d;
  font-family: sans-serif;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* CONTENEDOR */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
}

/* CÚPULA */
.glass {
  height: 300px;
  width: 180px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 100px 100px 0 0;
  position: relative;
}

/* BRILLO */
.glow {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  left: 50%;
  top: 30px;
  transform: translateX(-50%);
  box-shadow: 0 0 30px #ffd54f;
  animation: glowing 3s infinite;
}

/* TALLO */
.stem {
  width: 5px;
  height: 130px;
  background: #2e7d32;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* GIRASOL */
.sunflower {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
}

/* CENTRO */
.center {
  width: 40px;
  height: 40px;
  background: #4e342e;
  border-radius: 50%;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

/* PÉTALOS */
.petal {
  width: 18px;
  height: 50px;
  background: linear-gradient(#ffd54f, #fbc02d);
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: bottom center;
  border-radius: 50%;
  animation: sway 4s ease-in-out infinite;
}

/* GENERAR MUCHOS PÉTALOS */
.petal:nth-child(1)  { transform: translate(-50%, -100%) rotate(0deg); }
.petal:nth-child(2)  { transform: translate(-50%, -100%) rotate(30deg); }
.petal:nth-child(3)  { transform: translate(-50%, -100%) rotate(60deg); }
.petal:nth-child(4)  { transform: translate(-50%, -100%) rotate(90deg); }
.petal:nth-child(5)  { transform: translate(-50%, -100%) rotate(120deg); }
.petal:nth-child(6)  { transform: translate(-50%, -100%) rotate(150deg); }
.petal:nth-child(7)  { transform: translate(-50%, -100%) rotate(180deg); }
.petal:nth-child(8)  { transform: translate(-50%, -100%) rotate(210deg); }
.petal:nth-child(9)  { transform: translate(-50%, -100%) rotate(240deg); }
.petal:nth-child(10) { transform: translate(-50%, -100%) rotate(270deg); }
.petal:nth-child(11) { transform: translate(-50%, -100%) rotate(300deg); }
.petal:nth-child(12) { transform: translate(-50%, -100%) rotate(330deg); }

/* HOJA */
.leaf {
  width: 40px;
  height: 20px;
  background: #388e3c;
  border-radius: 50%;
  position: absolute;
  bottom: 80px;
}

.leaf.left {
  left: 20px;
  transform: rotate(-30deg);
}

.leaf.right {
  right: 20px;
  transform: rotate(30deg);
}

/* BASE */
.base {
  width: 180px;
  height: 8px;
  background: rgba(255,255,255,0.4);
}

/* MENSAJE */
.message {
  position: absolute;
  bottom: 8%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  opacity: 0;
  animation: fadeIn 3s forwards 3s;
}

/* ANIMACIONES */
@keyframes glowing {
  50% { box-shadow: 0 0 60px #ffd54f; }
}

@keyframes sway {
  50% { transform: translate(-50%, -100%) rotate(var(--r)) scale(1.05); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* RESPONSIVE */
@media (max-width:600px){
  .container {
    transform: translate(-50%, -50%) scale(0.65);
  }
}
</style>
</head>

<body>

<canvas></canvas>

<div class="container">
  <div class="glass">
    <div class="glow"></div>

    <div class="sunflower">
      <!-- pétalos -->
      <div class="petal" style="--r:0deg"></div>
      <div class="petal" style="--r:30deg"></div>
      <div class="petal" style="--r:60deg"></div>
      <div class="petal" style="--r:90deg"></div>
      <div class="petal" style="--r:120deg"></div>
      <div class="petal" style="--r:150deg"></div>
      <div class="petal" style="--r:180deg"></div>
      <div class="petal" style="--r:210deg"></div>
      <div class="petal" style="--r:240deg"></div>
      <div class="petal" style="--r:270deg"></div>
      <div class="petal" style="--r:300deg"></div>
      <div class="petal" style="--r:330deg"></div>

      <!-- centro -->
      <div class="center"></div>
    </div>

    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>

  </div>
  <div class="base"></div>
</div>

<div class="message">pequeños detalles ✨</div>

<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* viento */
let wind = 0;

function move(e){
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  wind = (x / window.innerWidth - 0.5) * 2;
}
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);

/* pétalos flotando */
const petals = [];
const TOTAL = 30;

class Petal {
  constructor(){ this.reset(); }

  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*-canvas.height;
    this.size = 5 + Math.random()*6;
    this.speedY = 1 + Math.random();
    this.speedX = Math.random();
    this.angle = Math.random()*Math.PI;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);

    ctx.fillStyle = "#ffd54f";
    ctx.beginPath();
    ctx.ellipse(0,0,this.size,this.size/2,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  update(){
    this.y += this.speedY;
    this.x += this.speedX + wind*2;
    this.angle += 0.03;

    if(this.y > canvas.height) this.reset();
    this.draw();
  }
}

for(let i=0;i<TOTAL;i++) petals.push(new Petal());

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>p.update());
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
