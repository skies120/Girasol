<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequeños Detalles</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #11243d;
  font-family: sans-serif;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* CONTENEDOR */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
}

/* ROSA COMPLEJA */
.container .glass {
  height: 300px;
  width: 180px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 100px 100px 0 0;
  position: relative;
  margin: auto;
}

.container .glow {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  left: 50%;
  top: 20px;
  transform: translateX(-50%);
  box-shadow: 0 0 30px #f594b8;
  animation: glowing 3s infinite;
}

/* TALLO */
.stem {
  width: 4px;
  height: 120px;
  background: green;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* PÉTALOS CENTRO */
.rose {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
}

.petal {
  width: 30px;
  height: 40px;
  background: crimson;
  position: absolute;
  border-radius: 50%;
  animation: float 4s ease-in-out infinite;
}

.p1 { transform: rotate(0deg); }
.p2 { transform: rotate(60deg); }
.p3 { transform: rotate(120deg); }

/* HOJA */
.fallen {
  width: 30px;
  height: 20px;
  background: crimson;
  border-radius: 50%;
  position: absolute;
  bottom: 10px;
  left: 60px;
}

/* BASE */
.base {
  width: 180px;
  height: 8px;
  background: rgba(255,255,255,0.4);
}

/* MENSAJE */
.message {
  position: absolute;
  bottom: 8%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  opacity: 0;
  animation: fadeIn 3s forwards 3s;
}

/* ANIMACIONES */
@keyframes glowing {
  50% { box-shadow: 0 0 60px #f594b8; }
}

@keyframes float {
  50% { transform: translateY(-5px) rotate(10deg); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* RESPONSIVE */
@media (max-width:600px){
  .container {
    transform: translate(-50%, -50%) scale(0.65);
  }
}
</style>
</head>

<body>

<canvas></canvas>

<div class="container">
  <div class="glass">
    <div class="glow"></div>

    <div class="rose">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
    </div>

    <div class="stem"></div>
    <div class="fallen"></div>
  </div>
  <div class="base"></div>
</div>

<div class="message">pequeños detalles ✨</div>

<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* viento */
let wind = 0;

function move(e){
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  wind = (x / window.innerWidth - 0.5) * 2;
}
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);

/* pétalos optimizados */
const petals = [];
const TOTAL = 30; // reducido para móvil

class Petal {
  constructor(){ this.reset(); }

  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*-canvas.height;
    this.size = 5 + Math.random()*6;
    this.speedY = 1 + Math.random();
    this.speedX = Math.random();
    this.angle = Math.random()*Math.PI;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);

    ctx.fillStyle = "#ff4e85";
    ctx.beginPath();
    ctx.ellipse(0,0,this.size,this.size/2,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  update(){
    this.y += this.speedY;
    this.x += this.speedX + wind*2;
    this.angle += 0.03;

    if(this.y > canvas.height) this.reset();
    this.draw();
  }
}

for(let i=0;i<TOTAL;i++) petals.push(new Petal());

/* animación */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>p.update());
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
