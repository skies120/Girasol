<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pequeños Detalles</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #11243d; /* fondo tipo imagen */
  font-family: sans-serif;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* CONTENEDOR */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* CÚPULA */
.glass {
  width: 180px;
  height: 260px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 90px 90px 0 0;
  position: relative;
}

/* BASE */
.base {
  width: 180px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  position: absolute;
  bottom: 0;
}

/* TALLO */
.stem {
  width: 4px;
  height: 120px;
  background: green;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* ROSA */
.rose {
  position: absolute;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
}

.petal {
  width: 30px;
  height: 40px;
  background: crimson;
  position: absolute;
  border-radius: 50%;
}

.p1 { transform: rotate(0deg); }
.p2 { transform: rotate(60deg); }
.p3 { transform: rotate(120deg); }

/* HOJA CAÍDA */
.fallen {
  width: 30px;
  height: 20px;
  background: crimson;
  border-radius: 50%;
  position: absolute;
  bottom: 10px;
  left: 60px;
}

/* BRILLO */
.glow {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 40px rgba(255,100,150,0.5);
  animation: pulse 3s infinite;
}

@keyframes pulse {
  50% { box-shadow: 0 0 70px rgba(255,100,150,0.9); }
}

/* MENSAJE */
.message {
  position: absolute;
  bottom: 8%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 22px;
  opacity: 0;
  animation: fadeIn 3s forwards 3s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* RESPONSIVE */
@media (max-width:600px){
  .container { transform: translate(-50%, -50%) scale(0.8); }
}
</style>
</head>

<body>

<canvas></canvas>

<div class="container">
  <div class="glass">
    <div class="glow"></div>

    <div class="rose">
      <div class="petal p1"></div>
      <div class="petal p2"></div>
      <div class="petal p3"></div>
    </div>

    <div class="stem"></div>
    <div class="fallen"></div>
  </div>
  <div class="base"></div>
</div>

<div class="message">pequeños detalles ✨</div>

<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* viento */
let wind = 0;

function move(e){
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  wind = (x / window.innerWidth - 0.5) * 2;
}
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);

/* pétalos */
const petals = [];
const TOTAL = 50;

class Petal {
  constructor(){ this.reset(); }

  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*-canvas.height;
    this.size = 6 + Math.random()*8;
    this.speedY = 1 + Math.random();
    this.speedX = Math.random();
    this.angle = Math.random()*Math.PI;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);

    let g = ctx.createLinearGradient(0,0,this.size,this.size);
    g.addColorStop(0,"#ff7aa5");
    g.addColorStop(1,"#ff2e63");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0,0,this.size,this.size/2,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  update(){
    this.y += this.speedY;
    this.x += this.speedX + wind*2;
    this.angle += 0.03;

    if(this.y > canvas.height) this.reset();
    this.draw();
  }
}

for(let i=0;i<TOTAL;i++) petals.push(new Petal());

/* partículas tipo brillo */
const sparkles = [];

for(let i=0;i<20;i++){
  sparkles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    o: Math.random()
  });
}

function drawSparkles(){
  sparkles.forEach(s=>{
    ctx.fillStyle = "rgba(255,150,200,"+s.o+")";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  petals.forEach(p=>p.update());
  drawSparkles();

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
